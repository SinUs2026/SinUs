<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SinUs – Öğretmen Girişi</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/11111.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a3a6b 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.giris-kutu{background:white;border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:0.6rem;margin-bottom:0.4rem}
.logo-img{width:38px;height:38px;object-fit:contain}
.logo{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#0a1628;text-align:center}
.logo span{color:#d4af37}
.altyazi{text-align:center;color:#64748b;font-size:0.9rem;margin-bottom:2rem}
.rozet-wrap{text-align:center;margin-bottom:1.5rem}
.rozet{display:inline-flex;align-items:center;gap:0.4rem;background:#eff6ff;color:#2563a8;padding:0.3rem 0.8rem;border-radius:20px;font-size:0.75rem;font-weight:600}
label{display:block;font-size:0.85rem;font-weight:600;color:#1e293b;margin-bottom:0.4rem}
input{width:100%;padding:0.85rem 1rem;border:2px solid #e2e8f0;border-radius:10px;font-size:0.95rem;font-family:'DM Sans',sans-serif;color:#1e293b;outline:none;transition:border-color 0.2s;margin-bottom:1.2rem}
input:focus{border-color:#2563a8}
.giris-btn{width:100%;padding:0.9rem;background:#0a1628;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:0.5rem;transition:opacity 0.2s}
.giris-btn:hover{opacity:0.9}
.giris-btn:disabled{background:#94a3b8;cursor:not-allowed}
.geri{display:block;text-align:center;margin-top:1.2rem;color:#64748b;font-size:0.85rem;text-decoration:none}
.geri:hover{color:#0a1628}
.hata{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1rem;display:none}
.basari{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1rem;display:none}
</style>
</head>
<body>
<div class="giris-kutu">
  <div class="rozet-wrap"><div class="rozet">👨‍🏫 Öğretmen Girişi</div></div>
  <div class="logo-wrap">
    
    <div class="logo">Sin<span>Us</span></div>
  </div>
  <div class="altyazi">Öğretmen paneline erişmek için giriş yapın</div>
  <div class="hata" id="hata"></div>
  <div class="basari" id="basari"></div>
  <label>Kullanıcı Adı</label>
  <input type="text" id="kullanici" placeholder="Kullanıcı adını gir">
  <label>Şifre</label>
  <input type="password" id="sifre" placeholder="Şifreni gir">
  <button class="giris-btn" id="btn" onclick="girisYap()">Giriş Yap</button>
  <a href="index.html" class="geri">← Ana sayfaya dön</a>
</div>
<script>
const SUPABASE_URL='https://sfyjnwhblxldrzbrnyva.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmeWpud2hibHhsZHJ6YnJueXZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDc4NTYsImV4cCI6MjA5NjMyMzg1Nn0.3mrQ2JSX4InY89iUnoJUCnWefxHXHjgM059PeLQedew';
async function girisYap(){
  var k=document.getElementById('kullanici').value.trim();
  var s=document.getElementById('sifre').value.trim();
  var hata=document.getElementById('hata');
  var basari=document.getElementById('basari');
  var btn=document.getElementById('btn');
  hata.style.display='none';basari.style.display='none';
  if(!k||!s){hata.innerText='Lütfen tüm alanları doldurun.';hata.style.display='block';return;}
  btn.disabled=true;btn.innerText='Kontrol ediliyor...';
  try{
    var r=await fetch(SUPABASE_URL+'/rest/v1/kullanicilar?kullanici_adi=eq.'+encodeURIComponent(k)+'&rol=eq.ogretmen&aktif=eq.true&select=*',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    var d=await r.json();
    if(d&&d.length>0&&d[0].sifre===s){
      sessionStorage.setItem('okubit_kullanici',d[0].kullanici_adi);
      localStorage.setItem('okubit_kullanici_obj',JSON.stringify(d[0]));
      basari.innerText='Giriş başarılı! Yönlendiriliyorsunuz...';
      basari.style.display='block';
      setTimeout(function(){window.location.href='ogretmen.html';},800);
    }else{
      hata.innerText='Kullanıcı adı veya şifre hatalı.';
      hata.style.display='block';
      btn.disabled=false;btn.innerText='Giriş Yap';
    }
  }catch(e){
    hata.innerText='Bağlantı hatası.';
    hata.style.display='block';
    btn.disabled=false;btn.innerText='Giriş Yap';
  }
}
document.addEventListener('keypress',function(e){if(e.key==='Enter')girisYap();});
</script>
</body>
</html>
