<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaybolan Metin – SinUs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap');
:root {
  --bg: #060d1a; --accent: #00d4ff; --accent2: #0088bb;
  --gold: #ffd700; --green: #00ff88; --red: #ff4466;
  --white: #e8f4ff; --grey: #6a8aaa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Nunito',sans-serif; color:var(--white); min-height:100vh; user-select:none; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 40%, rgba(0,212,255,0.15) 0%, transparent 100%);
}
#app { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:16px; min-height:100vh; display:flex; flex-direction:column; }
.header { display:flex; justify-content:space-between; align-items:center; padding:8px 0 16px; }
.logo { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:900; color:var(--accent); letter-spacing:3px; }
.logo span { color:var(--white); }
.ust-geri-btn { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:var(--white); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1.05rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.ust-geri-btn:hover { background:rgba(255,255,255,0.16); border-color:var(--accent); color:var(--accent); }
.mod-pill { background:rgba(147,51,234,0.12); border:1px solid rgba(147,51,234,0.4); border-radius:20px; padding:5px 14px; font-size:0.78rem; color:#c084fc; font-weight:700; }
.screen { display:none; flex-direction:column; align-items:center; flex:1; }
.screen.active { display:flex; }
.game-title { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; text-align:center; margin:12px 0 4px; }
.game-sub { color:var(--grey); font-size:0.8rem; letter-spacing:2px; text-align:center; margin-bottom:24px; }
.ayar-kart { background:rgba(255,255,255,0.03); border:1px solid rgba(0,212,255,0.15); border-radius:16px; padding:20px; width:100%; max-width:560px; margin-bottom:14px; }
.ayar-kart h3 { font-family:'Orbitron',sans-serif; font-size:0.68rem; color:var(--accent); letter-spacing:2px; margin-bottom:14px; opacity:0.8; }
.metin-liste { display:flex; flex-direction:column; gap:8px; max-height:200px; overflow-y:auto; }
.metin-item { background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.2); border-radius:10px; padding:10px 14px; cursor:pointer; transition:all 0.2s; }
.metin-item:hover { background:rgba(0,212,255,0.1); border-color:var(--accent); }
.metin-item.secili { background:rgba(0,212,255,0.15); border-color:var(--accent); }
.metin-item-baslik { font-weight:700; font-size:0.9rem; color:var(--white); }
.metin-item-alt { font-size:0.72rem; color:var(--grey); margin-top:3px; }
.zorluk-etiket { display:inline-block; padding:1px 8px; border-radius:10px; font-size:0.68rem; font-weight:700; margin-right:6px; }
.zorluk-etiket.basit { background:#f0fdf4; color:#15803d; }
.zorluk-etiket.orta { background:#fefce8; color:#b45309; }
.zorluk-etiket.zor { background:#fff1f2; color:#be123c; }
.zorluk-etiket.cok_zor { background:#fdf4ff; color:#7e22ce; }
.filtre-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.filtre-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:5px 12px; cursor:pointer; font-size:0.78rem; color:var(--grey); transition:all 0.2s; font-family:'Nunito',sans-serif; }
.filtre-btn:hover, .filtre-btn.aktif { background:rgba(0,212,255,0.1); border-color:var(--accent); color:var(--white); }
.ayar-satir { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.ayar-etiket { font-size:0.82rem; font-weight:700; color:var(--grey); min-width:140px; }
.ayar-slider { flex:1; -webkit-appearance:none; height:6px; border-radius:3px; background:rgba(255,255,255,0.1); outline:none; cursor:pointer; }
.ayar-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 0 8px rgba(0,212,255,0.5); }
.ayar-deger { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; color:var(--accent); min-width:60px; text-align:right; }
.basla-btn { width:100%; max-width:560px; padding:16px; background:linear-gradient(135deg,var(--accent2),var(--accent)); border:none; border-radius:14px; color:var(--bg); font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; letter-spacing:2px; cursor:pointer; margin-top:8px; transition:all 0.2s; }
.basla-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,212,255,0.3); }
.basla-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.geri-btn { margin-top:12px; color:rgba(106,138,170,0.8); font-size:0.8rem; text-decoration:none; display:block; text-align:center; padding:8px; background:none; border:none; cursor:pointer; font-family:'Nunito',sans-serif; }

/* OYUN */
.oyun-hud { display:flex; justify-content:space-between; align-items:center; width:100%; padding:10px 16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; margin-bottom:16px; }
.hud-item { text-align:center; }
.hud-lbl { font-size:0.6rem; color:var(--grey); letter-spacing:1px; text-transform:uppercase; }
.hud-val { font-family:'Orbitron',sans-serif; font-size:0.9rem; font-weight:700; color:var(--accent); margin-top:2px; }
.ilerleme-wrap { width:100%; margin-bottom:12px; }
.ilerleme-ust { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--grey); margin-bottom:4px; }
.ilerleme-bar { width:100%; height:5px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
.ilerleme-ic { height:100%; background:linear-gradient(90deg,var(--accent2),#c084fc); border-radius:3px; transition:width 0.3s; }

/* Metin gösterim alanı — tüm metin bir kerede görünür */
.metin-alan {
  width:100%;
  flex:1;
  min-height:280px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(147,51,234,0.18);
  border-radius:20px;
  margin-bottom:12px;
  position:relative;
  overflow-y:auto;
  padding:28px 26px;
}
.metin-govde {
  font-family:'Nunito',sans-serif;
  font-weight:600;
  font-size:clamp(1.05rem,2.4vw,1.3rem);
  line-height:2;
  color:var(--white);
}
.metin-govde .cumle {
  transition:opacity 0.6s ease;
  display:inline;
}
.metin-govde .cumle.silindi {
  opacity:0;
}

.bitti-overlay {
  position:absolute; inset:0;
  background:rgba(6,13,26,0.92);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:20px;
}
.bitti-overlay.gorulur { display:flex; }
.bitti-icon { font-size:3rem; margin-bottom:8px; }
.bitti-yazi { font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700; color:var(--green); }

.durum-msg { font-family:'Orbitron',sans-serif; font-size:0.8rem; color:var(--grey); letter-spacing:2px; text-align:center; margin:6px 0; min-height:20px; }

.kontrol-row { display:flex; gap:10px; justify-content:center; width:100%; max-width:560px; }
.btn-kontrol { flex:1; padding:13px; border:none; border-radius:12px; font-family:'Orbitron',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-durdur { background:rgba(255,68,102,0.15); border:1px solid rgba(255,68,102,0.4); color:var(--red); }
.btn-durdur:hover { background:rgba(255,68,102,0.25); }
.btn-bastan { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--accent); }
.btn-bastan:hover { background:rgba(0,212,255,0.2); }
.btn-devam { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:var(--bg); }

.oyun-hiz-row { display:flex; align-items:center; gap:10px; width:100%; max-width:560px; margin-top:10px; }
.oyun-hiz-lbl { font-size:0.78rem; color:var(--grey); white-space:nowrap; }
.oyun-hiz-slider { flex:1; -webkit-appearance:none; height:5px; border-radius:3px; background:rgba(255,255,255,0.1); outline:none; cursor:pointer; }
.oyun-hiz-slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
.oyun-hiz-deger { font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:700; color:var(--accent); min-width:60px; text-align:right; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="ust-geri-btn" onclick="sinusTamamlandiSinyalGonderVeDon()" title="Panele Dön">←</button>
      <div class="logo">Sin<span>Us</span></div>
    </div>
    <div class="mod-pill">🌑 Kaybolan Metin</div>
  </div>

  <!-- AYARLAR -->
  <div id="screenAyar" class="screen active">
    <div class="game-title">KAYBOLAN METİN</div>
    <div class="game-sub">SİLİNEN CÜMLE TEKNİĞİ</div>

    <div class="ayar-kart">
      <h3>METİN SEÇ</h3>
      <div class="filtre-row">
        <button class="filtre-btn aktif" onclick="filtreUygula('',this)">Tümü</button>
        <button class="filtre-btn" onclick="filtreUygula('basit',this)">Basit</button>
        <button class="filtre-btn" onclick="filtreUygula('orta',this)">Orta</button>
        <button class="filtre-btn" onclick="filtreUygula('zor',this)">Zor</button>
        <button class="filtre-btn" onclick="filtreUygula('cok_zor',this)">Çok Zor</button>
      </div>
      <div class="metin-liste" id="metinListe">
        <div style="text-align:center;color:var(--grey);padding:20px;font-size:0.85rem">⏳ Metinler yükleniyor...</div>
      </div>
    </div>

    <div class="ayar-kart">
      <h3>HIZ AYARI</h3>
      <div class="ayar-satir">
        <span class="ayar-etiket">KPM (Kelime/Dakika)</span>
        <input type="range" class="ayar-slider" id="hizSlider" min="50" max="1000" step="50" value="150"
          oninput="hizGuncelle(this.value)">
        <span class="ayar-deger" id="hizDeger">150 KPM</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--grey);margin-top:-4px">
        <span>50 (Yavaş)</span><span>500 (Orta)</span><span>1000 (Hızlı)</span>
      </div>
    </div>

    <button class="basla-btn" id="baslaBtn" onclick="oyunuBaslat()" disabled>▶ BAŞLAT</button>
    <a id="backBtn" href="#" class="geri-btn">← Panele Dön</a>
  </div>

  <!-- OYUN -->
  <div id="screenOyun" class="screen">
    <div class="oyun-hud">
      <div class="hud-item"><div class="hud-lbl">Metin</div><div class="hud-val" id="hudMetin">—</div></div>
      <div class="hud-item"><div class="hud-lbl">Hız</div><div class="hud-val" id="hudHiz">—</div></div>
      <div class="hud-item"><div class="hud-lbl">Cümle</div><div class="hud-val" id="hudCumle">0/0</div></div>
    </div>

    <div class="ilerleme-wrap">
      <div class="ilerleme-ust">
        <span id="ilerlemeYazi">0 / 0 cümle</span>
        <span id="ilerlemeYuzde">%0</span>
      </div>
      <div class="ilerleme-bar"><div class="ilerleme-ic" id="ilerlemeIc" style="width:0%"></div></div>
    </div>

    <div class="metin-alan">
      <div class="metin-govde" id="metinGovde"></div>
      <div class="bitti-overlay" id="bittiOverlay">
        <div class="bitti-icon">🌑</div>
        <div class="bitti-yazi">METİN TAMAMLANDI!</div>
      </div>
    </div>

    <div class="durum-msg" id="durumMsg">HAZIR OL...</div>

    <div class="kontrol-row">
      <button class="btn-kontrol btn-bastan" onclick="bastanAl()">↺ BAŞTAN</button>
      <button class="btn-kontrol btn-durdur" id="durdurBtn" onclick="durdurDevam()">⏸ DURDUR</button>
      <button class="btn-kontrol btn-devam" onclick="menuye()">☰ MENÜ</button>
    </div>

    <div class="oyun-hiz-row">
      <span class="oyun-hiz-lbl">Hız:</span>
      <input type="range" class="oyun-hiz-slider" id="oyunHizSlider" min="50" max="1000" step="50" value="150"
        oninput="oyunHizGuncelle(this.value)">
      <span class="oyun-hiz-deger" id="oyunHizDeger">150 KPM</span>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kwzimkjspdtedqqwztcf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3emlta2pzcGR0ZWRxcXd6dGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg4NDAsImV4cCI6MjA5NzUyNDg0MH0.64Bq_jlCNSdOnOJx3dxw1vNeEaEcMrK3OJeATYQxlcU';

(function() {
  const from = new URLSearchParams(window.location.search).get('from');
  document.getElementById('backBtn').href='#';
  document.getElementById('backBtn').addEventListener('click',function(e){e.preventDefault();sinusTamamlandiSinyalGonderVeDon();});
})();

const G = {
  metinler: [], seciliMetin: null, kpm: 150,
  cumleler: [], mevcutIndex: 0, calisiyor: false, timeout: null, filtre: ''
};

async function metinleriYukle() {
  try {
    let url = SUPABASE_URL + '/rest/v1/ders_metinleri?order=zorluk,baslik';
    if (G.filtre) url += '&zorluk=eq.' + G.filtre;
    const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
    G.metinler = await res.json();
    metinListesiOlustur();
  } catch(e) {
    document.getElementById('metinListe').innerHTML = '<div style="text-align:center;color:var(--red);padding:20px">❌ Metinler yüklenemedi</div>';
  }
}

function metinListesiOlustur() {
  const liste = document.getElementById('metinListe');
  if (G.metinler.length === 0) { liste.innerHTML = '<div style="text-align:center;color:var(--grey);padding:20px;font-size:0.85rem">📭 Bu filtrede metin bulunamadı</div>'; return; }
  liste.innerHTML = '';
  G.metinler.forEach(m => {
    const div = document.createElement('div');
    div.className = 'metin-item' + (G.seciliMetin && G.seciliMetin.id === m.id ? ' secili' : '');
    div.onclick = () => metinSec(m, div);
    div.innerHTML = `<div class="metin-item-baslik">${m.baslik}</div><div class="metin-item-alt"><span class="zorluk-etiket ${m.zorluk}">${zorlukAd(m.zorluk)}</span>${m.kelime_sayisi || '?'} kelime</div>`;
    liste.appendChild(div);
  });
}

function zorlukAd(z) { return {basit:'Basit',orta:'Orta',zor:'Zor',cok_zor:'Çok Zor'}[z] || z; }

function metinSec(m, el) {
  G.seciliMetin = m;
  document.querySelectorAll('.metin-item').forEach(i => i.classList.remove('secili'));
  el.classList.add('secili');
  document.getElementById('baslaBtn').disabled = false;
}

function filtreUygula(zorluk, el) {
  G.filtre = zorluk; G.seciliMetin = null;
  document.getElementById('baslaBtn').disabled = true;
  document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
  el.classList.add('aktif');
  metinleriYukle();
}

function hizGuncelle(v) { G.kpm = parseInt(v); document.getElementById('hizDeger').textContent = v + ' KPM'; }

function oyunHizGuncelle(v) {
  G.kpm = parseInt(v);
  document.getElementById('oyunHizDeger').textContent = v + ' KPM';
  document.getElementById('hudHiz').textContent = v + ' KPM';
}

// Metni cümlelere böl (nokta, ünlem, soru işaretiyle biten gruplar)
function metniCumlelereAyir(metin) {
  const parcalar = metin.match(/[^.!?]+[.!?]+/g) || [metin];
  return parcalar.map(c => c.trim()).filter(c => c.length > 0);
}

// Cümleleri ekrana bas, her biri ayrı bir span
function metinGoster(metin) {
  const cumleler = metniCumlelereAyir(metin);
  if (cumleler.length === 0) cumleler.push(metin);
  G.cumleler = cumleler;
  const govde = document.getElementById('metinGovde');
  govde.innerHTML = cumleler.map((c,i) => `<span class="cumle" id="ckelime-${i}">${c}</span>`).join(' ');
}

function oyunuBaslat() {
  if (!G.seciliMetin) return;
  metinGoster(G.seciliMetin.metin);
  G.mevcutIndex = 0;
  G.calisiyor = false;

  showScreen('screenOyun');
  document.getElementById('hudMetin').textContent = G.seciliMetin.baslik.substring(0, 15) + (G.seciliMetin.baslik.length > 15 ? '...' : '');
  document.getElementById('hudHiz').textContent = G.kpm + ' KPM';
  document.getElementById('oyunHizSlider').value = G.kpm;
  document.getElementById('oyunHizDeger').textContent = G.kpm + ' KPM';
  document.getElementById('bittiOverlay').classList.remove('gorulur');
  document.getElementById('durdurBtn').textContent = '⏸ DURDUR';
  ilerlemeGuncelle();

  document.getElementById('durumMsg').textContent = 'BAŞLIYOR...';
  G.timeout = setTimeout(() => {
    document.getElementById('durumMsg').textContent = '';
    G.calisiyor = true;
    sonrakiCumle();
  }, 1000);
}

function sonrakiCumle() {
  if (!G.calisiyor) return;
  if (G.mevcutIndex >= G.cumleler.length) { bitir(); return; }

  const el = document.getElementById('ckelime-' + G.mevcutIndex);
  const kelimeSayisi = G.cumleler[G.mevcutIndex].split(/\s+/).length;
  if (el) el.classList.add('silindi');

  G.mevcutIndex++;
  ilerlemeGuncelle();

  // Cümledeki kelime sayısına göre bekleme süresi (Akan Cümle'deki formülle aynı)
  const bekleme = Math.round((60000 / G.kpm) * kelimeSayisi);
  G.timeout = setTimeout(sonrakiCumle, bekleme);
}

function ilerlemeGuncelle() {
  const toplam = G.cumleler.length;
  const mevcut = Math.min(G.mevcutIndex, toplam);
  const yuzde = toplam > 0 ? Math.round(mevcut / toplam * 100) : 0;
  document.getElementById('ilerlemeYazi').textContent = mevcut + ' / ' + toplam + ' cümle';
  document.getElementById('ilerlemeYuzde').textContent = '%' + yuzde;
  document.getElementById('ilerlemeIc').style.width = yuzde + '%';
  document.getElementById('hudCumle').textContent = mevcut + '/' + toplam;
}

function bitir() {
  G.calisiyor = false; clearTimeout(G.timeout);
  document.getElementById('bittiOverlay').classList.add('gorulur');
  document.getElementById('durumMsg').textContent = 'TAMAMLANDI! 🌑';
  document.getElementById('durdurBtn').textContent = '▶ TEKRAR';
}

function durdurDevam() {
  if (G.mevcutIndex >= G.cumleler.length) { bastanAl(); return; }
  if (G.calisiyor) {
    G.calisiyor = false; clearTimeout(G.timeout);
    document.getElementById('durdurBtn').textContent = '▶ DEVAM';
    document.getElementById('durumMsg').textContent = 'DURAKLATILDI';
  } else {
    G.calisiyor = true;
    document.getElementById('durdurBtn').textContent = '⏸ DURDUR';
    document.getElementById('durumMsg').textContent = '';
    sonrakiCumle();
  }
}

function bastanAl() {
  G.calisiyor = false; clearTimeout(G.timeout);
  G.mevcutIndex = 0;
  document.getElementById('bittiOverlay').classList.remove('gorulur');
  document.querySelectorAll('#metinGovde .cumle').forEach(c => c.classList.remove('silindi'));
  document.getElementById('durdurBtn').textContent = '⏸ DURDUR';
  document.getElementById('durumMsg').textContent = 'BAŞLIYOR...';
  ilerlemeGuncelle();
  G.timeout = setTimeout(() => {
    document.getElementById('durumMsg').textContent = '';
    G.calisiyor = true;
    sonrakiCumle();
  }, 1000);
}

function menuye() { G.calisiyor = false; clearTimeout(G.timeout); showScreen('screenAyar'); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
